services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    environment:
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:3000}"
      DATABASE_PATH: "${DATABASE_PATH:-/app/data/links.db}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY:-development-only-change-me}"
      ACCESS_TOKEN_MINUTES: "${ACCESS_TOKEN_MINUTES:-15}"
      REFRESH_TOKEN_DAYS: "${REFRESH_TOKEN_DAYS:-30}"
      EMAIL_VERIFICATION_HOURS: "${EMAIL_VERIFICATION_HOURS:-24}"
      PASSWORD_RESET_MINUTES: "${PASSWORD_RESET_MINUTES:-30}"
      ADMIN_EMAILS: '${ADMIN_EMAILS:-[]}'
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}'
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2).read()"
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4-alpine
    user: redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 15s

volumes:
  sqlite_data:
  redis_data:
