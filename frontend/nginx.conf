server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ { proxy_pass http://app:8000; }
    location /health/ { proxy_pass http://app:8000; }
    location ~ ^/[A-Za-z0-9]{6,32}$ { proxy_pass http://app:8000; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
